name: Deploy

on:
  push:
    branches:
      - main

jobs:
  webhook:
    runs-on: ubuntu-latest

    steps:
    - name: Trigger Pull
      run: |
        curl -X POST \
        -H "Content-Type: application/json" \
        -H "X-Secret-Token: ${{ secrets.SECRET_KEY }}" \
        -d '{"ref": "${{ github.ref }}", "after": "${{ github.sha }}"}' \
        "${{ vars.URL }}/pull"

    - name: Wait
      run: sleep 10

    - name: Check Pull
      run: |
        CURRENT_VERSION=$(curl -s --fail "${{ vars.URL }}/version")
        if [[ "$CURRENT_VERSION" != "${{ github.sha }}" ]]; then
          echo "Pull did not complete successfully"
          exit 1
        fi
